apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: tams
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: tams
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/tams/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tams-jwt-secret
                  key: jwt-secret
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: tams-config
                  key: AUTH_SERVICE_URL
            - name: RULE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: tams-config
                  key: RULE_SERVICE_URL
            - name: ANALYSIS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: tams-config
                  key: ANALYSIS_SERVICE_URL
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: tams-config
                  key: CORS_ALLOWED_ORIGINS
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
