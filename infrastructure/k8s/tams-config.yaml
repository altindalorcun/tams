apiVersion: v1
kind: ConfigMap
metadata:
  name: tams-config
  namespace: tams
  labels:
    app.kubernetes.io/part-of: tams
data:
  # Kafka broker endpoint — used by analysis-service and parser-service.
  # Matches the ClusterIP service name defined in infrastructure/k8s/kafka/service.yaml.
  KAFKA_BROKER: "kafka.tams.svc.cluster.local:9092"

  # Internal service URLs — used by api-gateway for route forwarding
  # and by analysis-service to reach rule-service.
  # Short-form names resolve within the tams namespace; FQDN shown as comment for clarity.
  AUTH_SERVICE_URL: "http://auth-service:8081"        # auth-service.tams.svc.cluster.local
  RULE_SERVICE_URL: "http://rule-service:8082"        # rule-service.tams.svc.cluster.local
  ANALYSIS_SERVICE_URL: "http://analysis-service:8083" # analysis-service.tams.svc.cluster.local

  # CORS allowed origins for the api-gateway.
  # Update to the actual public domain before deploying to production.
  CORS_ALLOWED_ORIGINS: "https://tams.example.com"

  # Structured log level for all services.
  LOG_LEVEL: "INFO"
