# Edge reverse proxy for Docker Compose HTTPS mode.
# Terminates TLS and routes /api to api-gateway and / to frontend.
# Listens on 8443 (HTTPS) and 8080 (HTTP redirect) inside the container;
# map host ports 443 and 80 in docker-compose.https.yml.

upstream tams_frontend {
    server frontend:80;
}

upstream tams_api_gateway {
    server api-gateway:8080;
}

server {
    listen 8080;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location /api/ {
        proxy_pass         http://tams_api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location / {
        proxy_pass         http://tams_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
