spring:
  application:
    name: analysis-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_ANALYSIS_HOST:localhost}:${POSTGRES_ANALYSIS_PORT:5434}/${POSTGRES_ANALYSIS_DB:tams_analysis}
    username: ${POSTGRES_ANALYSIS_USER}
    password: ${POSTGRES_ANALYSIS_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BROKER:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: analysis-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET}
  rule-service:
    base-url: ${RULE_SERVICE_URL:http://rule-service:8082}
  kafka:
    topics:
      transcript-raw: transcript.raw
      transcript-parsed: transcript.parsed

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    tr.com.hacettepe.tams: DEBUG
