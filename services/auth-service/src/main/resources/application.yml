spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_AUTH_HOST:localhost}:${POSTGRES_AUTH_PORT:5432}/${POSTGRES_AUTH_DB:tams_auth}
    username: ${POSTGRES_AUTH_USER}
    password: ${POSTGRES_AUTH_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  admin:
    seed-email: ${ADMIN_SEED_EMAIL}
    seed-username: ${ADMIN_SEED_USERNAME}
    seed-password: ${ADMIN_SEED_PASSWORD}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    tr.com.hacettepe.tams: DEBUG
