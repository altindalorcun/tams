spring:
  application:
    name: rule-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_RULES_HOST:localhost}:${POSTGRES_RULES_PORT:5433}/${POSTGRES_RULES_DB:tams_rules}
    username: ${POSTGRES_RULES_USER}
    password: ${POSTGRES_RULES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    tr.com.hacettepe.tams: DEBUG
